<div class="flex flex-col flex-auto min-w-0">

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row items-center justify-between w-full max-w-xs sm:max-w-none" *ngIf="showFilters">
        <mat-form-field class="fuse-mat-no-subscript w-full sm:w-72 mt-4 sm:mt-0" [floatLabel]="'always'">
            <mat-icon matPrefix class="icon-size-5" [svgIcon]="'heroicons_solid:search'"></mat-icon>
            <input matInput [formControl]="searchInputControl" [placeholder]="'Search forms...'" #searchInputField>
        </mat-form-field>

        <div class="flex items-center mt-6 sm:mt-0 ml-auto space-x-2">
            <div class="text-secondary font-medium mr-2 text-sm uppercase tracking-wider">Category:</div>
            <div class="flex items-center p-1 bg-gray-100 dark:bg-gray-800 rounded-xl">
                <button mat-button class="rounded-lg px-4 min-w-0 h-8 text-xs font-bold uppercase tracking-wide" 
                        [ngClass]="{'bg-white shadow dark:bg-gray-700 text-primary': (filterCategory$ | async) === 'all'}"
                        (click)="filterByCategory('all')">All</button>
                <button *ngFor="let category of categories$ | async" 
                        mat-button class="rounded-lg px-4 min-w-0 h-8 text-xs font-bold uppercase tracking-wide"
                        [ngClass]="{'bg-white shadow dark:bg-gray-700 text-primary': (filterCategory$ | async) === category}"
                        (click)="filterByCategory(category)">{{category}}</button>
            </div>
        </div>
    </div>

    <!-- Forms Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mt-8 sm:mt-10">
        <ng-container *ngIf="(forms$ | async) as forms">
            <ng-container *ngFor="let form of forms; trackBy: trackByFn">
                <!-- Form Card -->
                <div class="flex flex-col shadow rounded-[2rem] overflow-hidden bg-card hover:shadow-2xl transition-all duration-500 ease-out border border-transparent hover:border-primary-500/30 group">
                    <div class="flex flex-col p-8 pb-6 relative overflow-hidden">
                        <!-- Abstract Background Decoration -->
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-primary/5 rounded-full blur-2xl group-hover:bg-primary/10 transition-colors duration-500"></div>
                        
                        <!-- Icon & Category -->
                        <div class="flex items-center justify-between relative z-10">
                            <div class="flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 text-primary group-hover:scale-110 transition-transform duration-500">
                                <mat-icon class="icon-size-7 text-current" [svgIcon]="form.icon || 'heroicons_outline:document-text'"></mat-icon>
                            </div>
                            <div class="px-4 py-1.5 rounded-full text-[10px] font-extrabold tracking-widest uppercase bg-primary/5 text-primary-600 dark:text-primary-400">
                                {{form.category}}
                            </div>
                        </div>
                        <!-- Name -->
                        <div class="mt-8 text-xl font-extrabold leading-tight line-clamp-2 h-14 group-hover:text-primary transition-colors duration-300">{{form.name}}</div>
                    </div>
                    
                    <!-- Actions -->
                    <div class="flex items-center p-5 mt-auto border-t border-gray-100 dark:border-white/5 bg-gray-50/50 dark:bg-white/5 backdrop-blur-sm">
                        <button mat-button class="min-w-0 px-4 h-10 rounded-xl text-primary font-bold group/btn" *ngIf="form.allowView" (click)="onAction(form, 'view')">
                            <mat-icon class="icon-size-5 mr-2 group-hover/btn:translate-x-1 transition-transform" [svgIcon]="'heroicons_outline:eye'"></mat-icon>
                            <span>View</span>
                        </button>
                        
                        <div class="flex items-center ml-auto space-x-2">
                            <button mat-icon-button class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-300" 
                                    *ngIf="form.allowPdf" [matTooltip]="'Export PDF'" (click)="onAction(form, 'pdf')">
                                <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:document-text'"></mat-icon>
                            </button>
                            <button mat-icon-button class="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white transition-all duration-300" 
                                    *ngIf="form.allowEmail" [matTooltip]="'Email to Client'" (click)="onAction(form, 'email')">
                                <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:envelope'"></mat-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </ng-container>
        </ng-container>
    </div>

    <!-- No Results -->
    <ng-container *ngIf="(forms$ | async)?.length === 0">
        <div class="flex flex-col items-center justify-center mt-24 py-20 px-8 bg-card border-2 border-dashed border-primary/20 rounded-[3rem]">
            <div class="w-24 h-24 rounded-full bg-primary/5 flex items-center justify-center mb-6">
                <mat-icon class="icon-size-12 text-primary/30" [svgIcon]="'heroicons_outline:document-search'"></mat-icon>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 dark:text-gray-200 text-center">No Forms Available</h3>
            <p class="text-secondary text-sm text-center max-w-xs mt-2 font-medium">There are no forms matching your current customer type or search criteria.</p>
        </div>
    </ng-container>

</div>
