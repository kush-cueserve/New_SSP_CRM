<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="flex flex-col shadow bg-card">
        <div class="flex flex-col flex-0 sm:flex-row items-center md:items-start p-6 sm:py-12 md:px-12 border-b">
            <!-- Title -->
            <div class="flex flex-col">
                <div class="text-4xl font-extrabold tracking-tight leading-none text-primary">Forms & Documents</div>
                <div class="mt-1.5 text-lg text-secondary font-medium">Browse and generate pre-filled forms for your clients</div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="flex flex-col flex-auto p-6 sm:p-10">
        <forms-grid [showFilters]="true"></forms-grid>
    </div>
</div>
