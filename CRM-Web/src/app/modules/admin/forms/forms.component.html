<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="flex flex-col shadow bg-card">
        <div class="flex flex-col flex-0 sm:flex-row items-center md:items-start p-6 sm:py-12 md:px-12 border-b">
            <!-- Title -->
            <div class="flex flex-col">
                <div class="text-4xl font-extrabold tracking-tight leading-none">Forms & Documents</div>
                <div class="mt-1.5 text-lg text-secondary">Browse and generate pre-filled forms for your clients</div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="flex flex-col flex-auto p-6 sm:p-10">

        <!-- Filters -->
        <div class="flex flex-col sm:flex-row items-center justify-between w-full max-w-xs sm:max-w-none">
            <mat-form-field class="fuse-mat-no-subscript w-full sm:w-72 mt-4 sm:mt-0" [floatLabel]="'always'">
                <mat-icon matPrefix class="icon-size-5" [svgIcon]="'heroicons_solid:search'"></mat-icon>
                <input matInput [formControl]="searchInputControl" [placeholder]="'Search forms...'" #searchInputField>
            </mat-form-field>

            <div class="flex items-center mt-6 sm:mt-0 ml-auto space-x-2">
                <div class="text-secondary font-medium mr-2">Category:</div>
                <div class="flex items-center p-1 bg-gray-100 dark:bg-gray-800 rounded-lg">
                    <button mat-button class="rounded-lg px-4" 
                            [ngClass]="{'bg-white shadow dark:bg-gray-700': (filterCategory$ | async) === 'all'}"
                            (click)="filterByCategory('all')">All</button>
                    <button *ngFor="let category of categories$ | async" 
                            mat-button class="rounded-lg px-4"
                            [ngClass]="{'bg-white shadow dark:bg-gray-700': (filterCategory$ | async) === category}"
                            (click)="filterByCategory(category)">{{category}}</button>
                </div>
            </div>
        </div>

        <!-- Forms Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mt-8 sm:mt-10">
            <ng-container *ngIf="(forms$ | async) as forms">
                <ng-container *ngFor="let form of forms; trackBy: trackByFn">
                    <!-- Form Card -->
                    <div class="flex flex-col shadow rounded-2xl overflow-hidden bg-card hover:shadow-xl transition-shadow duration-300 ease-in-out border border-transparent hover:border-primary-500">
                        <div class="flex flex-col p-8 pb-6">
                            <!-- Icon & Category -->
                            <div class="flex items-center justify-between">
                                <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-primary-50 dark:bg-primary-500/10 text-primary">
                                    <mat-icon class="icon-size-6 text-current" [svgIcon]="form.icon || 'heroicons_outline:document-text'"></mat-icon>
                                </div>
                                <div class="px-3 py-1 rounded-full text-xs font-semibold tracking-wide uppercase bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-300">
                                    {{form.category}}
                                </div>
                            </div>
                            <!-- Name -->
                            <div class="mt-6 text-xl font-bold leading-tight line-clamp-2 h-14">{{form.name}}</div>
                        </div>
                        
                        <!-- Actions -->
                        <div class="flex items-center p-4 mt-auto border-t bg-gray-50 dark:bg-transparent">
                            <button mat-button class="min-w-0 px-3 text-primary-500" *ngIf="form.allowView" [matTooltip]="'Preview'" (click)="openContactPicker(form)">
                                <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:eye'"></mat-icon>
                                <span class="ml-2 font-semibold">View</span>
                            </button>
                            <div class="flex items-center ml-auto space-x-1">
                                <button mat-icon-button class="text-red-500" *ngIf="form.allowPdf" [matTooltip]="'Export PDF'" (click)="openContactPicker(form)">
                                    <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:document-text'"></mat-icon>
                                </button>
                                <button mat-icon-button class="text-blue-500" *ngIf="form.allowEmail" [matTooltip]="'Email to Client'" (click)="openContactPicker(form)">
                                    <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:envelope'"></mat-icon>
                                </button>
                                <button mat-icon-button class="text-emerald-500" *ngIf="form.allowDownload" [matTooltip]="'Download Template'" (click)="openContactPicker(form)">
                                    <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:arrow-down-tray'"></mat-icon>
                                </button>
                            </div>
                        </div>
                    </div>
                </ng-container>
            </ng-container>
        </div>

        <!-- No Results -->
        <ng-container *ngIf="(forms$ | async)?.length === 0">
            <div class="flex flex-col items-center justify-center mt-24">
                <mat-icon class="icon-size-24 text-secondary opacity-50" [svgIcon]="'heroicons_outline:document-search'"></mat-icon>
                <div class="mt-4 text-2xl font-semibold tracking-tight text-secondary">No forms found matching your criteria</div>
            </div>
        </ng-container>

    </div>
</div>
