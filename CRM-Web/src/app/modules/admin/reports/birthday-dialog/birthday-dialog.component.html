<div class="flex flex-col max-w-160 max-h-screen-75 overflow-hidden rounded-2xl bg-card">
    
    <!-- Header with festive background pattern -->
    <div class="relative flex flex-col items-center justify-center py-10 px-8 bg-primary text-on-primary overflow-hidden">
        <!-- Abstract festive background shapes -->
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <svg class="absolute -top-10 -left-10 w-40 h-40" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="currentColor"></circle>
            </svg>
            <svg class="absolute -bottom-10 -right-10 w-60 h-60" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="currentColor"></circle>
            </svg>
        </div>
        
        <mat-icon class="icon-size-16 mb-4 text-white animate-bounce" [svgIcon]="'heroicons_outline:cake'"></mat-icon>
        <div class="text-3xl font-extrabold tracking-tight text-center leading-none">Celebrations Ahead!</div>
        <div class="mt-2 text-primary-100 font-medium tracking-wide uppercase text-xs">Upcoming Customer Birthdays</div>
        
        <button class="absolute top-4 right-4" mat-icon-button (click)="dialogRef.close()" [color]="'inherit'">
            <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
        </button>
    </div>

    <!-- Content -->
    <div class="flex flex-col p-6 overflow-y-auto">
        <ng-container *ngIf="(birthdays$ | async) as birthdays; else loading">
            
            <div *ngIf="birthdays.length === 0" class="flex flex-col items-center justify-center p-8 text-center">
                <mat-icon class="icon-size-16 text-hint mb-4" [svgIcon]="'heroicons_outline:cake'"></mat-icon>
                <div class="text-xl font-semibold text-secondary">No birthdays in the next 7 days</div>
            </div>

            <div class="space-y-4">
                <div *ngFor="let person of birthdays; let i = index" 
                     class="birthday-card flex items-center bg-card shadow-sm border rounded-xl overflow-hidden hover:shadow-md transition-shadow">
                    
                    <!-- Date Block -->
                    <div class="date-block flex flex-col items-center justify-center w-24 h-24 shrink-0 text-white font-bold"
                         [ngClass]="getColorClass(i)">
                        <div class="text-3xl leading-none">{{person.day}}</div>
                        <div class="text-sm uppercase tracking-wider">{{person.month}}</div>
                    </div>

                    <!-- Details -->
                    <div class="flex flex-col flex-auto px-6 py-4">
                        <div class="text-lg font-bold text-slate-900 dark:text-white leading-snug">
                            {{person.name}}
                        </div>
                        <div class="flex items-center mt-1 text-secondary">
                            <mat-icon class="icon-size-4 mr-2" [svgIcon]="'heroicons_mini:envelope'"></mat-icon>
                            <span class="text-sm truncate">{{person.email || 'No email provided'}}</span>
                        </div>
                        <div class="mt-2 flex items-center">
                            <span *ngIf="person.daysUntil === 0" 
                                  class="px-2 py-0.5 rounded text-xs font-bold bg-rose-100 text-rose-600 dark:bg-rose-500/20 dark:text-rose-400">
                                TODAY 🎂
                            </span>
                            <span *ngIf="person.daysUntil > 0" 
                                  class="text-xs font-medium text-hint">
                                in {{person.daysUntil}} {{person.daysUntil === 1 ? 'day' : 'days'}}
                            </span>
                        </div>
                    </div>

                    <!-- Action -->
                    <div class="pr-4">
                        <button mat-icon-button color="primary" [matTooltip]="'View Profile'" [routerLink]="['/customers', person.customerId]" (click)="dialogRef.close()">
                            <mat-icon class="icon-size-5" [svgIcon]="'heroicons_mini:chevron-right'"></mat-icon>
                        </button>
                    </div>
                </div>
            </div>

        </ng-container>

        <ng-template #loading>
            <div class="flex items-center justify-center p-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
            </div>
        </ng-template>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end px-6 py-4 bg-gray-50 dark:bg-transparent border-t">
        <button mat-button (click)="dialogRef.close()">Close</button>
    </div>
</div>
