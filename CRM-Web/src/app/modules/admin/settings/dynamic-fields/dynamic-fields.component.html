<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b bg-card dark:bg-transparent">
        <div class="flex flex-col">
            <!-- Breadcrumbs -->
            <div class="flex items-center text-sm font-medium text-secondary whitespace-nowrap">
                <a class="text-primary cursor-pointer hover:underline" [routerLink]="['/dashboard']">Home</a>
                <mat-icon class="icon-size-4 mx-1" [svgIcon]="'heroicons_mini:chevron-right'"></mat-icon>
                <span>Settings</span>
                <mat-icon class="icon-size-4 mx-1" [svgIcon]="'heroicons_mini:chevron-right'"></mat-icon>
                <span>Dynamic Field</span>
            </div>
            <div class="mt-2 text-4xl font-extrabold tracking-tight leading-none text-slate-900 dark:text-white">Dynamic Field</div>
        </div>
        <div *ngIf="!isReadOnly" class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button mat-flat-button [color]="'primary'" (click)="openDialog()">
                <mat-icon class="icon-size-5 mr-2" [svgIcon]="'heroicons_outline:plus'"></mat-icon>
                Add Dynamic Field
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-auto overflow-hidden">
        <div class="flex flex-col flex-auto sm:mb-18 overflow-hidden sm:overflow-y-auto">
            
            <div class="flex flex-col flex-auto bg-card shadow overflow-hidden sm:rounded-2xl m-6 sm:m-10 sm:p-0">
                
                <div *ngIf="isLoading" class="flex justify-center p-8">
                    <mat-spinner diameter="40"></mat-spinner>
                </div>

                <div class="overflow-x-auto" *ngIf="!isLoading">
                    <table mat-table [dataSource]="fields" class="w-full">
                        
                        <!-- Display Name Column -->
                        <ng-container matColumnDef="displayName">
                            <th mat-header-cell *matHeaderCellDef class="px-6 py-4 font-semibold text-secondary bg-gray-50 border-b">Field Label</th>
                            <td mat-cell *matCellDef="let element" class="px-6 py-4 border-b">{{element.displayName}}</td>
                        </ng-container>

                        <!-- Field Type Column -->
                        <ng-container matColumnDef="fieldType">
                            <th mat-header-cell *matHeaderCellDef class="px-6 py-4 font-semibold text-secondary bg-gray-50 border-b">Field Type</th>
                            <td mat-cell *matCellDef="let element" class="px-6 py-4 border-b">
                                <span class="capitalize">
                                    {{ element.fieldType === 'string' ? 'Textbox' : 
                                       element.fieldType === 'boolean' ? 'Checkbox (Yes / No)' : 
                                       element.fieldType === 'textarea' ? 'Multiline' : element.fieldType }}
                                </span>
                            </td>
                        </ng-container>

                        <!-- Actions Column -->
                        <ng-container matColumnDef="actions">
                            <th mat-header-cell *matHeaderCellDef class="px-6 py-4 font-semibold text-secondary bg-gray-50 border-b w-32">Action</th>
                            <td mat-cell *matCellDef="let element" class="px-6 py-4 border-b">
                                <button mat-icon-button (click)="openDialog(element)" class="text-secondary hover:text-primary">
                                    <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:pencil'"></mat-icon>
                                </button>
                                <button mat-icon-button (click)="deleteField(element)" class="text-secondary hover:text-red-500">
                                    <mat-icon class="icon-size-5 text-red-400" [svgIcon]="'heroicons_outline:trash'"></mat-icon>
                                </button>
                            </td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50"></tr>
                        
                        <!-- Empty Data -->
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell px-6 py-8 border-b text-center text-secondary" colspan="3">
                                No dynamic fields found.
                            </td>
                        </tr>
                    </table>
                </div>

            </div>

        </div>
    </div>
</div>
