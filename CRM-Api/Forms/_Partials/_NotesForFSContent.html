<div class="row mt-2 ml-2">
    <table class="tblclass mt-2 w-100">
        <tr>
            <td class="w-41">
                <table class="w-100">
                    <tr>
                        <td style="width: 3%;">
                            <label>Client Code:</label>
                        </td>
                        <td class="w-15">
                            <span style="outline: 0;background: transparent;width: 100%;">@Code@</span>
                        </td>
                    </tr>
                </table>
            </td>
            <td style="width: 50%;">
                <table class="w-100">
                    <tr>
                        <td style="width: 1%;">
                            <label>Name:</label>
                        </td>
                        <td class="w-34">
                            <span style="outline: 0;background: transparent;width: 100%;">@Name@</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <table class="tblclass mt-2 w-100">
        <tr>
            <td style="width: 30%;">
                <table class="w-100">
                    <tr>
                        <td class="w-30">
                            <label>ABN Number:</label>
                        </td>
                        <td class="w-35">
                            <span style="outline: 0;background: transparent;width: 100%;">@ABNNumber@</span>
                        </td>
                    </tr>
                </table>
            </td>
            <td style="width: 50%;">
                <table class="w-100">
                    <tr>
                        <td class="w-8">
                            <label>Tax File Number:</label>
                        </td>
                        <td class="w-34">
                            <span style="outline: 0;background: transparent;width: 100%;">@TFNNumber@</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <table class="tblclass mt-2 w-100">
        <tr>
            <td class="w-41">
                <table class="w-100">
                    <tr>
                        <td class="w-12">
                            <label>Contact Number:</label>
                        </td>
                        <td class="w-30">
                            <span style="outline: 0;background: transparent;width: 100%;">@CellPhone@</span>
                        </td>
                    </tr>
                </table>
            </td>
            <td style="width: 50%;">
                <table class="w-100">
                    <tr>
                        <td style="width: 2%">
                            <label>Email:</label>
                        </td>
                        <td class="w-50">
                            <span style="outline: 0;background: transparent;width: 100%;">@Email@</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <table class="tblclass mt-2 w-100">
        <tr>
            <td class="w-100">
                <table class="w-100">
                    <tr>
                        <td class="w-15">
                            <label>Retained Earnings:</label>
                        </td>
                        <td class="w-92">
                            <span style="outline: 0;background: transparent;width: 100%;">@RetainedEarningsNote@</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    <table class="tblclass mt-2 w-100">
        <tr>
            <td class="w-100">
                <table class="w-100">
                    <tr>
                        <td class="w-12">
                            <label>Common Note:</label>
                        </td>
                        <td class="w-92">
                            <span style="outline: 0;background: transparent;width: 100%;">@CommonNote@</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
